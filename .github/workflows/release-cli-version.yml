name: Release Enclave CLI version
on:
  push:
    tags:
      - 'v*'
env:
  RUST_BACKTRACE: 1
  STAGE: production
  # Directories to target during release
  BIN_DIR: bin
  RELEASE_DIR: release
jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      full_version: ${{ steps.get-full-version.outputs.full_version }}
      major_version: ${{ steps.get-major-version.outputs.result }}
    steps:
      - uses: actions/checkout@v5
      - id: get-full-version
        run: |
          echo "using version tag ${GITHUB_REF:11}"
          echo "full_version=${GITHUB_REF:11}" >> $GITHUB_OUTPUT
      - id: get-major-version
        uses: actions/github-script@v8
        with:
          script: |
            const [ref,tag,version] = context.ref.split('/');
            if (version[0] === 'v') {
              return version.slice(1).split('.')[0];
            }
            return version.split('.')[0];
          result-encoding: string
  build-and-deploy:
    needs: [get-version]
    uses: ./.github/workflows/build-and-publish.yml
    with:
      stage: 'production'
      major-version: ${{ needs.get-version.outputs.major_version }}
      full-version: ${{ needs.get-version.outputs.full_version }}
      ev-domain: 'evervault.com'
    secrets:
      aws-oidc-role-arn: ${{ secrets.AWS_EV_CLI_PRODUCTION_OIDC_ROLE_ARN }}
      aws-cloudfront-distribution-id: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
  release-cli-version:
    needs: [build-and-deploy, get-version]
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.get-version.outputs.full_version }}
          release_name: ${{ needs.get-version.outputs.full_version }}
      - name: Download all build artifacts
        uses: actions/download-artifact@v6.0.0
        with:
          pattern: '{linux,macos}-*'
          path: dist
      - name: Upload Linux x86_64 Release
        uses: shogo82148/actions-upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path:
            ./dist/linux-x86_64-unknown-linux-musl/ev-x86_64-unknown-linux-musl-${{ needs.get-version.outputs.full_version }}.tar.gz
          asset_content_type: application/gzip
          asset_name:
            ev-x86_64-unknown-linux-musl-${{ needs.get-version.outputs.full_version }}.tar.gz
      - name: Upload Linux aarch64 Release
        uses: shogo82148/actions-upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path:
            ./dist/linux-aarch64-unknown-linux-musl/ev-aarch64-unknown-linux-musl-${{ needs.get-version.outputs.full_version }}.tar.gz
          asset_content_type: application/gzip
          asset_name:
            ev-aarch64-unknown-linux-musl-${{ needs.get-version.outputs.full_version }}.tar.gz
      - name: Upload MacOS x86_64 Release
        uses: shogo82148/actions-upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path:
            ./dist/macos-x86_64-apple-darwin/ev-x86_64-apple-darwin-${{ needs.get-version.outputs.full_version }}.tar.gz
          asset_content_type: application/gzip
          asset_name:
            ev-x86_64-apple-darwin-${{ needs.get-version.outputs.full_version }}.tar.gz
      - name: Upload MacOS arm64 Release
        uses: shogo82148/actions-upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path:
            ./dist/macos-aarch64-apple-darwin/ev-aarch64-apple-darwin-${{ needs.get-version.outputs.full_version }}.tar.gz
          asset_content_type: application/gzip
          asset_name:
            ev-aarch64-apple-darwin-${{ needs.get-version.outputs.full_version }}.tar.gz
